##### =========================
#####  Core behavior
##### =========================

# Better colors (for modern terminals)
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"

# Reduce escape delay (fixes sluggish ESC/vim)
set -sg escape-time 0

# Large scrollback
set -g history-limit 200000

# Enable mouse (scroll, resize panes, select windows)
set -g mouse on

# Faster repeat key handling
set -g repeat-time 300

# Vi mode everywhere
setw -g mode-keys vi

# Focus events (helps vim + neovim + terminal apps)
set -g focus-events on

# Keep window numbering stable + start at 1 (like humans)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Auto-renaming window based on current process (can be annoying; toggle if you want)
setw -g automatic-rename on
set -g set-titles on


##### =========================
#####  Prefix + keybind philosophy
##### =========================

# Use Ctrl-a as prefix (like screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Make prefix feel instant
set -g prefix2 None


##### =========================
#####  Splits and pane navigation
##### =========================

# Split like vim-style
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

# Create splits in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-like pane switching (no prefix needed)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Resize panes (Alt + hjkl)
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

# Quick layout switching
bind Space next-layout


##### =========================
#####  Copy mode (macOS friendly)
##### =========================

# Enter copy mode
bind Enter copy-mode

# In copy mode (vi):
# v = begin selection
# y = copy selection
# (on macOS: copies to system clipboard via pbcopy)
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Normal mode paste
bind p paste-buffer


##### =========================
#####  Quality of life
##### =========================

# Reload config quickly
bind r source-file ~/.tmux.conf \; display-message "✅ Reloaded ~/.tmux.conf"

# Kill pane/window/session shortcuts
bind x kill-pane
bind & kill-window
bind X confirm-before -p "Kill session? (y/n)" kill-session

# Move between windows faster
bind -n S-Left  previous-window
bind -n S-Right next-window

# Swap windows easily
bind < swap-window -t -1
bind > swap-window -t +1

# Toggle status bar
bind b set -g status


##### =========================
#####  Status bar (clean & minimal)
##### =========================

set -g status on
set -g status-interval 2
set -g status-position bottom

# Style
set -g status-style "bg=#111111,fg=#bbbbbb"
set -g message-style "bg=#111111,fg=#00ffcc"

# Left: session name
set -g status-left-length 40
set -g status-left "#[fg=#00ffcc,bold] #S #[fg=#666666]|"

# Right: date time + host
set -g status-right-length 120
set -g status-right "#[fg=#666666]%Y-%m-%d #[fg=#bbbbbb]%H:%M "

# Window tabs
setw -g window-status-separator "  "
setw -g window-status-format "#[fg=#666666]#I:#W"
setw -g window-status-current-format "#[fg=#00ffcc,bold]#I:#W"


##### =========================
#####  Performance / sanity
##### =========================

# Don’t show “Activity” messages
setw -g monitor-activity off
set -g visual-activity off

# Aggressive resize helps with different client sizes
setw -g aggressive-resize on

##### =========================
#####  Plugins (TPM)
##### =========================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# better copy/yank
set -g @plugin 'tmux-plugins/tmux-yank'

# resurrect sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
